{% load i18n %}
<!doctype html>
<html lang="{{ LANGUAGE_CODE|default:'uz' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% trans "Unfold Boilerplate" %}</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e5e7eb; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    section { max-width: 720px; }
    h1 { font-size: clamp(40px, 8vw, 88px); line-height: .9; margin: 0 0 20px; letter-spacing: -.06em; }
    p { font-size: 18px; line-height: 1.65; color: #cbd5e1; }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>{% trans "Django Unfold boilerplate" %}</h1>
      <p>{% trans "PostgreSQL, RustFS media storage, JWT auth, OTP, DRF, Channels, and hardened admin defaults are ready." %}</p>
      <p><a href="/admin/">{% trans "Open admin" %}</a> · <a href="/api/health/">{% trans "Health check" %}</a></p>
    </section>
  </main>
</body>
</html>
