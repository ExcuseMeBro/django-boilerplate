services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-unfold_boilerplate_db}
      POSTGRES_USER: ${DB_USER:-unfold_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-unfold_password_change_me}
      TZ: ${TZ:-Asia/Tashkent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin-change-me}
      MINIO_REGION_NAME: ${MINIO_REGION:-us-east-1}
      TZ: ${TZ:-Asia/Tashkent}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin-change-me}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-unfold-boilerplate}
    entrypoint: >
      sh -c "
        mc alias set minio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing minio/$$MINIO_BUCKET_NAME &&
        mc anonymous set public minio/$$MINIO_BUCKET_NAME &&
        echo 'MinIO bucket ready.'
      "
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-unfold-boilerplate-dev-secret-key-change-me}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      ENABLE_HTTPS_REDIRECT: ${ENABLE_HTTPS_REDIRECT:-False}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-unfold_boilerplate_db}
      DB_USER: ${DB_USER:-unfold_user}
      DB_PASSWORD: ${DB_PASSWORD:-unfold_password_change_me}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      USE_MINIO: ${USE_MINIO:-True}
      FORCE_MINIO_IN_DEBUG: ${FORCE_MINIO_IN_DEBUG:-True}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-localhost:9000}
      MINIO_INTERNAL_ENDPOINT: ${MINIO_INTERNAL_ENDPOINT:-minio:9000}
      MINIO_USE_HTTPS: ${MINIO_USE_HTTPS:-False}
      MINIO_INTERNAL_USE_HTTPS: ${MINIO_INTERNAL_USE_HTTPS:-False}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin-change-me}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-unfold-boilerplate}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      DRF_THROTTLE_ANON: ${DRF_THROTTLE_ANON:-100/hour}
      DRF_THROTTLE_USER: ${DRF_THROTTLE_USER:-1000/hour}
      DRF_THROTTLE_OTP: ${DRF_THROTTLE_OTP:-5/minute}
      OTP_LENGTH: ${OTP_LENGTH:-5}
      OTP_DEFAULT_CODE: ${OTP_DEFAULT_CODE:-11111}
      OTP_EXPIRY_SECONDS: ${OTP_EXPIRY_SECONDS:-120}
      OTP_RESEND_COOLDOWN_SECONDS: ${OTP_RESEND_COOLDOWN_SECONDS:-60}
      OTP_MAX_DAILY_PER_PHONE: ${OTP_MAX_DAILY_PER_PHONE:-9999}
      OTP_MAX_VERIFY_ATTEMPTS: ${OTP_MAX_VERIFY_ATTEMPTS:-3}
      SMS_BACKEND: ${SMS_BACKEND:-console}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      FIREBASE_CREDENTIALS_BASE64: ${FIREBASE_CREDENTIALS_BASE64:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      TZ: ${TZ:-Asia/Tashkent}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_files:
  media_files:
